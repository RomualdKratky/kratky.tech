name: Azure Static Web Apps CI/CD

# Required secrets:
#   CF_ANALYTICS_TOKEN                          — Cloudflare Web Analytics token
#   AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_DUNE_0EB6C9903 — Azure SWA deploy token
#
# Security note: actions are pinned to major version tags (@v4).
# For stricter supply-chain security, pin to commit SHAs instead.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  verify:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Verify (typecheck, lint, format, build)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run verify
        env:
          NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}

      # Upload the pre-built output so the deploy job can skip rebuilding
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 1

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    name: Deploy to Azure
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_DUNE_0EB6C9903 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_DUNE_0EB6C9903 }}
          action: close
